[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "brokerkit-upstox"
version = "1.0.2"
description = "Upstox adapter for BrokerKit."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "Aditya Vishwakarma", email = "vaditya098@gmail.com" }
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Office/Business :: Financial :: Investment",
    "Typing :: Typed",
]

dependencies = [
    "brokerkit-core",
    # Imported directly for this adapter's own models — declared
    # explicitly rather than relied on transitively via brokerkit-core.
    "pydantic>=2",
    "upstox-python-sdk",
    "requests",
    # Flask captures the OAuth redirect (get_access_token helper).
    "flask",
]

[project.urls]
Homepage = "https://github.com/dellindone/brokerkit"
Repository = "https://github.com/dellindone/brokerkit"
Issues = "https://github.com/dellindone/brokerkit/issues"

# Explicit, so setuptools never guesses (a bad guess is what made the repo
# root build an empty wheel).
[tool.setuptools.packages.find]
include = ["brokerkit_upstox*"]
