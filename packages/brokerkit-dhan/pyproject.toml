[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "brokerkit-dhan"
version = "1.0.0"
description = "Dhan adapter for BrokerKit."
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "Aditya Vishwakarma", email = "vaditya098@gmail.com" }
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Office/Business :: Financial :: Investment",
    "Typing :: Typed",
]

dependencies = [
    "brokerkit-core",
    # Imported directly for this adapter's own models — declared
    # explicitly rather than relied on transitively via brokerkit-core.
    "pydantic>=2",
    # Pinned to the pre-release deliberately: 2.3.0rc1 is the ONLY version
    # with Global Stocks support, and diffing it against stable 2.2.0 from
    # source showed it is purely additive (no changed/removed signatures).
    "dhanhq==2.3.0rc1",
    "requests",
    "pyotp",
]

# Explicit, so setuptools never guesses (a bad guess is what made the repo
# root build an empty wheel).
[tool.setuptools.packages.find]
include = ["brokerkit_dhan*"]
